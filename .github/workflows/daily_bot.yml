name: 🤖 Daily Site Bot

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 1200

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🤖 Run site bot
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          python site_bot.py \
            --url "$SITE_URL" \
            --min-hours 6 \
            --max-hours 18

      - name: 💾 Salvează statistici în repo
        run: |
          git config user.name "Site Bot"
          git config user.email "bot@github.com"
          git add stats.json
          git diff --staged --quiet || git commit -m "📊 Stats actualizate $(date -u +'%Y-%m-%d')"
          git push
